<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Zheying Liu</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css">
</head>
<body>

<div class="music-btn" id="musicToggle">
  <i class="fa-solid fa-music"></i>
</div>

<div class="info-bar">
  <div id="real-time"><i class="fa-solid fa-clock"></i> Loading...</div>
  <div class="weather">
    <span id="weather-sh"><i class="fa-solid fa-cloud"></i> Shanghai...</span>
    <span id="weather-hk"><i class="fa-solid fa-cloud"></i> Hong Kong...</span>
  </div>
</div>

<div class="lang-switch">
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('zh')">中文</button>
  <button onclick="setLang('tw')">繁中</button>
</div>

<nav class="navbar">
  <a href="index.html"><i class="fa-solid fa-house"></i></a>
  <a href="about.html"><i class="fa-solid fa-user-secret"></i></a>
  <a href="experience.html"><i class="fa-solid fa-briefcase"></i></a>
  <a href="projects.html"><i class="fa-solid fa-code"></i></a>
  <a href="blog.html"><i class="fa-solid fa-terminal"></i></a>
  <a href="contact.html"><i class="fa-solid fa-envelope"></i></a>
</nav>

<div class="container">
  <h2 class="section-title" data-i18n="contact.title">Contact Me</h2>
  <form class="contact-form">
    <div class="input-group">
      <i class="fa-solid fa-user"></i>
      <input type="text" placeholder="Your Name" data-i18n="contact.name" required>
    </div>
    <div class="input-group">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" placeholder="Your Email" data-i18n="contact.email" required>
    </div>
    <div class="input-group">
      <i class="fa-solid fa-comment"></i>
      <textarea rows="5" placeholder="Your Message" data-i18n="contact.msg" required></textarea>
    </div>
    <button type="submit"><i class="fa-solid fa-paper-plane"></i> <span data-i18n="contact.send">Send Message</span></button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
