<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Zheying Liu</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css">
</head>
<body>

<div class="bg-grid"></div>
<canvas id="codeRain"></canvas>

<div class="music-btn" id="musicToggle">
  <i class="fa-solid fa-music"></i>
</div>

<div class="info-bar">
  <div id="real-time"><i class="fa-solid fa-clock"></i> Loading...</div>
  <div class="weather">
    <span id="weather-sh">Shanghai</span>
    <span id="weather-hk">Hong Kong</span>
  </div>
</div>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('zh')">中</button>
  <button onclick="setLang('tw')">繁</button>
</div>

<nav class="navbar">
  <a href="index.html" data-i18n="nav.home"><i class="fa-solid fa-house"></i></a>
  <a href="about.html" data-i18n="nav.about"><i class="fa-solid fa-user-secret"></i></a>
  <a href="experience.html" data-i18n="nav.exp"><i class="fa-solid fa-briefcase"></i></a>
  <a href="projects.html" data-i18n="nav.proj"><i class="fa-solid fa-code"></i></a>
  <a href="blog.html" data-i18n="nav.blog"><i class="fa-solid fa-terminal"></i></a>
  <a href="contact.html" data-i18n="nav.contact"><i class="fa-solid fa-envelope"></i></a>
</nav>

<div class="container">
  <h2 class="section-title" data-i18n="contact.title">Contact</h2>

  <div class="card">
    <div class="form-group">
      <input type="text" placeholder="Your Name">
    </div>
    <div class="form-group">
      <input type="email" placeholder="Your Email">
    </div>
    <div class="form-group">
      <textarea placeholder="Your Message"></textarea>
    </div>
    <button class="btn-submit" onclick="alert('Message received!')">Send Message</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
